<!DOCTYPE html>
<html>
<head>
  <title>Hub Devices</title>
  <meta charset="utf-8">
  <style>
    body { background: #050507; color: #e0e0e0; font-family: monospace; padding: 20px; }
    h1 { color: #00ffcc; font-size: 14px; }
    .device { background: #111116; border: 1px solid #2d2d35; padding: 12px; margin: 8px 0; border-radius: 8px; }
    .device-id { color: #00ffcc; font-weight: bold; }
    .device-type { color: #888; font-size: 10px; }
    .online { color: #4ade80; }
    .offline { color: #f87171; }
    .label { color: #666; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    td, th { padding: 6px 8px; text-align: left; border-bottom: 1px solid #1f1f27; }
    th { color: #888; text-transform: uppercase; font-size: 9px; }
  </style>
</head>
<body>
  <h1>⬡ Download Hub - Device Dashboard</h1>
  <div id="hub-status"></div>
  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Type</th><th>IP</th><th>OS</th><th>Hostname</th><th>Status</th><th>Heartbeat</th></tr>
    </thead>
    <tbody id="devices"></tbody>
  </table>

  <script>
    async function load() {
      const res = await fetch('/api/grpc/clients');
      const data = await res.json();
      
      document.getElementById('hub-status').innerHTML = 
        '<div style="margin-bottom:12px;font-size:11px;color:#888">' +
        'Hub: <span style="color:' + (data.hub.alive ? '#4ade80' : '#f87171') + '">' + 
        (data.hub.alive ? '● ONLINE' : '● OFFLINE') + '</span> | ' +
        'Clients: ' + data.hub.connectedClients + ' | Storage: ' + data.hub.connectedStorage +
        '</div>';

      const tbody = document.getElementById('devices');
      tbody.innerHTML = '';
      
      if (data.devices.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#555;padding:40px">No devices connected</td></tr>';
        return;
      }

      for (const d of data.devices) {
        const tr = document.createElement('tr');
        const diff = Math.floor((Date.now() - (d.lastHeartbeat || 0)) / 1000);
        const hb = diff < 60 ? diff + 's ago' : Math.floor(diff/60) + 'm ago';
        tr.innerHTML = 
          '<td class="device-id">' + (d.deviceId || '?') + '</td>' +
          '<td>' + (d.deviceName || '?') + '</td>' +
          '<td><span style="background:#1f1f27;padding:2px 6px;border-radius:4px;font-size:10px">' + (d.deviceType || '?') + '</span></td>' +
          '<td>' + (d.ip || '?') + '</td>' +
          '<td>' + (d.os || '?') + '</td>' +
          '<td>' + (d.hostname || '?') + '</td>' +
          '<td class="' + (d.connectionState || 'offline') + '">● ' + (d.connectionState || 'offline') + '</td>' +
          '<td style="color:#888;font-size:10px">' + hb + '</td>';
        tbody.appendChild(tr);
      }
    }
    load();
    setInterval(load, 3000);
  </script>
</body>
</html>
